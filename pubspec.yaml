name: login1_0
description: "Aplicación Flutter con Cliente API REST y Tests de Integración"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # Animaciones
  animate_do: ^4.2.0

  # Gráficos
  fl_chart: ^1.0.0

  # Glassmorphism
  glassmorphism: ^3.0.0

  # HTTP (por si luego usas API real)
  http: ^1.5.0

  # Persistencia local
  shared_preferences: ^2.3.5

dev_dependencies:
  flutter_test:
    sdk: flutter

  integration_test:
    sdk: flutter

  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true